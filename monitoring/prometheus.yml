global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
  - job_name: health
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]
  - job_name: neo4j
    metrics_path: /metrics
    static_configs:
      - targets: ["neo4j:7474"]
  - job_name: ollama
    metrics_path: /metrics
    static_configs:
      - targets: ["ollama:11434"]
