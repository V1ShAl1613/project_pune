groups:
  - name: sentinel-fusion-ai.rules
    rules:
      - alert: HighCPUUsage
        expr: avg(rate(container_cpu_usage_seconds_total[5m])) by (pod) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: High CPU usage detected
      - alert: HighMemoryUsage
        expr: avg(container_memory_working_set_bytes) by (pod) / avg(container_spec_memory_limit_bytes) by (pod) > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: High memory usage detected
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Backend is unavailable
      - alert: APILatencyHigh
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: API latency is high
