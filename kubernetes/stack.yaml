apiVersion: v1
kind: Namespace
metadata:
  name: sentinel-fusion-ai
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-platform-config
  namespace: sentinel-fusion-ai
data:
  POSTGRES_DB: sentinel
  POSTGRES_USER: sentinel
  REDIS_APPENDONLY: "yes"
  QDRANT__SERVICE__GRPC_PORT: "6334"
  NEO4J_server_memory_pagecache_size: 512M
  NEO4J_server_memory_heap_initial__size: 512M
  NEO4J_server_memory_heap_max__size: 1G
---
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-platform-secrets
  namespace: sentinel-fusion-ai
type: Opaque
stringData:
  POSTGRES_PASSWORD: sentinel
  SENTINEL_DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@postgresql:5432/sentinel
  SENTINEL_REDIS_URL: redis://redis:6379/0
  SENTINEL_QDRANT_URL: http://qdrant:6333
  SENTINEL_NEO4J_URI: bolt://neo4j:7687
  SENTINEL_OLLAMA_URL: http://ollama:11434
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-data
  namespace: sentinel-fusion-ai
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: sentinel-fusion-ai
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-data
  namespace: sentinel-fusion-ai
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-data
  namespace: sentinel-fusion-ai
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-logs
  namespace: sentinel-fusion-ai
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: sentinel-fusion-ai
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: sentinel-fusion-ai
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: sentinel-fusion-ai
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 999
      containers:
        - name: postgresql
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: sentinel-platform-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: sentinel-platform-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              value: sentinel
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U sentinel -d sentinel"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U sentinel -d sentinel"]
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgresql-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sentinel-fusion-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sentinel-fusion-ai
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: sentinel-fusion-ai
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.12.4
          ports:
            - containerPort: 6333
          volumeMounts:
            - name: storage
              mountPath: /qdrant/storage
          readinessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: qdrant-data
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: sentinel-fusion-ai
spec:
  selector:
    app: qdrant
  ports:
    - port: 6333
      targetPort: 6333
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: sentinel-fusion-ai
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.24
          ports:
            - containerPort: 7474
            - containerPort: 7687
          env:
            - name: NEO4J_AUTH
              value: neo4j/sentinel
            - name: NEO4J_server_memory_pagecache_size
              valueFrom:
                configMapKeyRef:
                  name: sentinel-platform-config
                  key: NEO4J_server_memory_pagecache_size
            - name: NEO4J_server_memory_heap_initial__size
              valueFrom:
                configMapKeyRef:
                  name: sentinel-platform-config
                  key: NEO4J_server_memory_heap_initial__size
            - name: NEO4J_server_memory_heap_max__size
              valueFrom:
                configMapKeyRef:
                  name: sentinel-platform-config
                  key: NEO4J_server_memory_heap_max__size
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 20
            periodSeconds: 20
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 40
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: neo4j-data
        - name: logs
          persistentVolumeClaim:
            claimName: neo4j-logs
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: sentinel-fusion-ai
spec:
  selector:
    app: neo4j
  ports:
    - name: browser
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: sentinel-fusion-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 20
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: sentinel-fusion-ai
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: sentinel-fusion-ai
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      hostPID: true
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.2
          args:
            - --path.rootfs=/host
          ports:
            - containerPort: 9100
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: true
      volumes:
        - name: host-root
          hostPath:
            path: /
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sentinel-db-migration
  namespace: sentinel-fusion-ai
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migration
          image: ghcr.io/sentinel-fusion-ai/backend:1.0.0
          command: ["sh", "-c", "alembic upgrade head"]
          envFrom:
            - configMapRef:
                name: sentinel-platform-config
            - secretRef:
                name: sentinel-platform-secrets
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sentinel-backup
  namespace: sentinel-fusion-ai
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: backup
              image: ghcr.io/sentinel-fusion-ai/backend:1.0.0
              command: ["sh", "/app/scripts/backup-enterprise.sh"]
              envFrom:
                - configMapRef:
                    name: sentinel-platform-config
                - secretRef:
                    name: sentinel-platform-secrets
