name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry config virtualenvs.create false
          poetry install --only main --no-interaction --no-ansi
      - name: Run backend tests
        run: python -m pytest -q -p no:langsmith

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build frontend
        run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-banner --redact
      - name: Dependency scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, security]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
      - name: Setup helm
        uses: azure/setup-helm@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
      - name: Deploy helm release
        run: |
          helm upgrade --install sentinel-fusion-ai helm/sentinel-fusion-ai \
            --namespace sentinel-fusion-ai \
            --create-namespace \
            --set backend.image.repository=ghcr.io/${{ github.repository }}/backend \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.repository=ghcr.io/${{ github.repository }}/frontend \
            --set frontend.image.tag=${{ github.sha }}
      - name: Smoke test
        run: |
          kubectl rollout status deployment/sentinel-fusion-ai-sentinel-fusion-ai-backend -n sentinel-fusion-ai --timeout=300s
          kubectl rollout status deployment/sentinel-fusion-ai-sentinel-fusion-ai-frontend -n sentinel-fusion-ai --timeout=300s
