services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    environment:
      SENTINEL_ENVIRONMENT: development
      SENTINEL_DEBUG: "true"
      SENTINEL_DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@postgres:5432/sentinel
      SENTINEL_REDIS_URL: redis://redis:6379/0
      SENTINEL_QDRANT_URL: http://qdrant:6333
      SENTINEL_NEO4J_URI: bolt://neo4j:7687
      SENTINEL_OLLAMA_URL: http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant
      - neo4j
      - ollama
    networks:
      - sentinel-edge
      - sentinel-core

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sentinel-edge

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-core

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-core

  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-core

  neo4j:
    image: neo4j:5.24
    environment:
      NEO4J_AUTH: neo4j/sentinel
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - sentinel-core

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:11434/api/tags || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - sentinel-core

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
    networks:
      - sentinel-edge
      - sentinel-core

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  neo4j-data:
  neo4j-logs:
  ollama-data:

networks:
  sentinel-edge:
    driver: bridge
  sentinel-core:
    driver: bridge
