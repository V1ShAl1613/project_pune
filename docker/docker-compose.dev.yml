services:
  backend:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ../backend:/app/backend
    environment:
      SENTINEL_DEBUG: "true"

  frontend:
    command: ["npm", "run", "dev"]
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
