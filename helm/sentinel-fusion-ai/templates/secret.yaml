apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sentinel-fusion-ai.fullname" . }}-secret
  labels:
    {{- include "sentinel-fusion-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: sentinel
  SENTINEL_DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@postgresql:5432/sentinel
  SENTINEL_REDIS_URL: redis://redis:6379/0
  SENTINEL_QDRANT_URL: http://qdrant:6333
  SENTINEL_NEO4J_URI: bolt://neo4j:7687
  SENTINEL_OLLAMA_URL: http://ollama:11434
  SENTINEL_CORS_ORIGINS: https://sentinel-fusion-ai.example.com
