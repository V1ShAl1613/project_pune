apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sentinel-fusion-ai.fullname" . }}-config
  labels:
    {{- include "sentinel-fusion-ai.labels" . | nindent 4 }}
data:
  SENTINEL_ENVIRONMENT: {{ .Values.runtime.environment | quote }}
  SENTINEL_DEBUG: {{ .Values.runtime.debug | quote }}
  SENTINEL_APP_NAME: Sentinel Fusion AI
  NEXT_PUBLIC_API_BASE_URL: {{ .Values.runtime.apiBaseUrl | quote }}
